<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Login — MoodShare</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
    <div class="custom-cursor">
        <div class="cursor-dot"></div>
        <div class="cursor-click"></div>
        <div class="cursor-locate"></div>
    </div>
    <main class="auth-page">
        <form id="loginForm" class="auth-form">
            <h2>Se connecter</h2>
            <input id="email" type="email" placeholder="Email" required />
            <input id="password" type="password" placeholder="Mot de passe" required minlength="8" />
            <button type="submit">Se connecter</button>
            <p id="loginMsg" class="msg"></p>
        </form>
    </main>

    <script src="/server/routes/auth.js"></script>
    <script src="scripts/cursor.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('loginMsg');
            msg.textContent = '';
            try {
                await loginUser(email, password);
                msg.textContent = "Connecté — redirection...";
                setTimeout(() => location.href = "/profile.html", 600);
            } catch (err) {
                msg.textContent = err.error || "Erreur";
            }
        });
    </script>
</body>

</html>
