<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodShare</title>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" />
</head>

<body>
    <header>
        <div class="logo">
            <h1>MoodShare</h1>
            <p>Exprime ton mood</p>
        </div>
    </header>
    <nav>
        <button id="homeTab" class="active"><span class="material-symbols-rounded">home</span>Accueil</button>
        <button id="postsTab"><span class="material-symbols-rounded">post</span>Posts</button>
        <button id="createTab"><span class="material-symbols-rounded">add_circle</span>Créer</button>
        <button id="popularTab"><span class="material-symbols-rounded">mode_heat</span>Populaire</button>
        <button id="profileTab"><span class="material-symbols-rounded">account_circle</span>Profil</button>
    </nav>
    <section id="homeTab" class="tab active">
        <h1>Accueil</h1>
        <div class="stories">
            <h2>Stories</h2>
            <div class="stories-list">
                <div class="story skeleton"></div>
                <div class="story skeleton"></div>
                <div class="story skeleton"></div>
                <div class="story skeleton"></div>
                <div class="story skeleton"></div>
            </div>
        </div>

        <div class="posts-section">
            <h2>Posts récents</h2>
            <div class="post skeleton"></div>
            <div class="post skeleton"></div>
            <div class="post skeleton"></div>
        </div>

        <div class="suggested-accounts">
            <h2>Comptes à suivre</h2>
            <div class="accounts-list">
                <div class="account skeleton"></div>
                <div class="account skeleton"></div>
                <div class="account skeleton"></div>
            </div>
        </div>

        <div class="posts-section">
            <h2>Plus de posts</h2>
            <div class="post skeleton"></div>
            <div class="post skeleton"></div>
        </div>
    </section>

    <section id="postsTab" class="tab hidden">
        <h1>Posts</h2>
            <div id="moodWall"></div>
            <!-- Les posts apparaîtront ici -->
            </main>
    </section>

    <section id="createTab" class="tab hidden">
        <h1>Créer un Mood</h2>
            <button id="openModalBtn">Nouveau mood</button>

            <div id="postModal">
                <textarea id="moodInput" maxlength="100" placeholder="Comment tu te sens ?"></textarea>
                <div class="mood-options">
                    <input type="color" id="moodColor" value="#ffb6c1">
                    <select id="moodEmoji">
                        <option>😊</option>
                        <option>😢</option>
                        <option>😡</option>
                        <option>💖</option>
                        <option>😴</option>
                    </select>
                </div>
                <button id="submitMood">Partager</button>
            </div>
    </section>

    <section id="popularTab" class="tab hidden">
        <h1>Posts populaires</h2>
    </section>

    <section id="profileTab" class="tab hidden">
        <h1>Mon profil</h2>
    </section>
    <!-- Modal pour poster -->


</body>
<script src="scripts/app.js"></script>
<script src="server/server.js"></script>
<script src="server/database.js"></script>

</html>
