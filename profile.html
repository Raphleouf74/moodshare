<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Profile — MoodShare</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
    <!-- custom cursor markup + settings panel (inject the cursor HTML below) -->
    <div class="custom-cursor">
        <div class="cursor-dot"></div>
        <div class="cursor-click"></div>
        <div class="cursor-locate"></div>
    </div>
    <div id="scrollArrow"></div>
    <div class="cursor-settings" id="cursorSettingsPanel">
        <h3>Paramètres du curseur</h3>
        <label>Activer curseur personnalisé : <input id="cursorEnable" type="checkbox" checked></label>
        <label>Taille : <input id="cursorSize" type="range" min="6" max="40" value="12"></label>
        <label>Transparence : <input id="cursorOpacity" type="range" min="0.1" max="1" step="0.05" value="0.8"></label>
        <label>Couleur : <input id="cursorColor" type="color" value="#ffffff"></label>
        <label>Effet Hover:
            <select id="cursorHover">
                <option value="none">Aucun</option>
                <option value="invert">Inversion</option>
                <option value="grow">Agrandir</option>
            </select>
        </label>
    </div>

    <main class="profile-page">
        <h1>Votre profil</h1>
        <div id="profileInfo">Chargement...</div>
        <button id="logoutBtn">Se déconnecter</button>
    </main>

    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/cursor.js"></script> <!-- code complet plus bas -->
    <script>
        async function fetchProfile() {
            try {
                // Protected API call example (you could add an endpoint /api/me to return user from tokens)
                // For demo, redirect to login if not logged
                // We'll attempt refresh to see if user is authenticated
                const res = await fetch("https://TON_BACKEND_ON_RENDER/api/auth/refresh", { method: "POST", credentials: "include" });
                const json = await res.json();
                if (!res.ok) throw json;
                document.getElementById('profileInfo').textContent = "Connecté.";
            } catch (err) {
                location.href = "/login.html";
            }
        }
        fetchProfile();

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await logoutUser();
            location.href = "/login.html";
        });
    </script>
</body>

</html>
